<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<title>SSE Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0d1117;color:#c9d1d9;padding:24px;max-width:960px;margin:0 auto}
h1{color:#58a6ff;font-size:1.25em;margin-bottom:4px}
.sub{color:#8b949e;font-size:.82em;margin-bottom:16px}
.row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.row label{color:#8b949e;font-size:.82em;white-space:nowrap}
input[type=text]{flex:1;padding:9px 12px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px}
input[type=text]:focus{outline:none;border-color:#58a6ff}
input[type=number]{width:90px;padding:9px 10px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px}
button{padding:9px 18px;background:#1f6feb;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;white-space:nowrap}
button:hover{background:#388bfd}
button:disabled{background:#21262d;color:#8b949e;cursor:not-allowed}
#output{min-height:280px;border:1px solid #30363d;border-radius:6px;padding:14px;overflow-y:auto;max-height:620px}
.block{margin:6px 0;padding:9px 13px;border-radius:6px;border-left:4px solid}
.thinking{background:#1a1030;border-color:#8957e5}
.text    {background:#0d2416;border-color:#2ea043}
.tool_use{background:#2a1a00;border-color:#d29922}
.tool_result{background:#0d1a2e;border-color:#1f6feb}
.meta   {background:#161b22;border-color:#21262d;font-size:.8em}
.lbl{font-weight:700;font-size:.72em;margin-bottom:4px;letter-spacing:.06em}
.thinking .lbl{color:#8957e5}.text .lbl{color:#3fb950}
.tool_use .lbl{color:#d29922}.tool_result .lbl{color:#58a6ff}.meta .lbl{color:#8b949e}
pre{white-space:pre-wrap;word-break:break-word;font-size:.87em;line-height:1.7;color:#e6edf3}
.meta pre{color:#8b949e}
.hint{color:#8b949e;font-size:.85em}
</style></head>
<body>
<h1>SSE 流式 Demo</h1>
<p class="sub">协议: <code>text/event-stream</code> &nbsp;|&nbsp; 客户端: <code>EventSource</code> &nbsp;|&nbsp; 后端: <code>GET http://localhost:8000/stream</code></p>

<div class="row">
  <label>后端地址</label>
  <input type="text" id="base" value="http://localhost:8000" style="max-width:220px">
</div>
<div class="row">
  <input type="text" id="prompt" value="你好！先介绍一下自己，然后帮我在当前目录创建 test.txt，再查询北京天气预报" />
  <button id="btn" onclick="go()">▶ 发送</button>
</div>
<div id="output"><span class="hint">点击发送，thinking / text / tool_use / tool_result 会逐步出现…</span></div>

<script>
let es = null, blk = {};

function go() {
  const base = document.getElementById('base').value.replace(/\/$/, '');
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;
  document.getElementById('output').innerHTML = '';
  document.getElementById('btn').disabled = true;
  blk = {};
  if (es) es.close();

  const url = base + '/stream?prompt=' + encodeURIComponent(prompt);
  es = new EventSource(url);
  es.onmessage = e => handle(JSON.parse(e.data));
  es.onerror = () => { es.close(); document.getElementById('btn').disabled = false; };
}

function getBlock(idx, type) {
  if (blk[idx]) return blk[idx];
  const labels = { thinking: '🧠 THINKING', text: '📝 TEXT', tool_use: '🔧 TOOL USE' };
  const wrap = document.createElement('div');
  wrap.className = 'block ' + type;
  wrap.innerHTML = `<div class="lbl">${labels[type] || type}</div>`;
  const pre = document.createElement('pre');
  wrap.appendChild(pre);
  document.getElementById('output').appendChild(wrap);
  blk[idx] = { pre, type };
  return blk[idx];
}

function meta(label, text) {
  const d = document.createElement('div');
  d.className = 'block meta';
  d.innerHTML = `<div class="lbl">${label}</div><pre>${text}</pre>`;
  document.getElementById('output').appendChild(d);
  d.scrollIntoView({ block: 'nearest' });
}

function toolResult(name, input, result) {
  const d = document.createElement('div');
  d.className = 'block tool_result';
  d.innerHTML = `<div class="lbl">⚙️ TOOL RESULT — ${name}</div><pre>input:  ${JSON.stringify(input)}\nresult: ${result}</pre>`;
  document.getElementById('output').appendChild(d);
  d.scrollIntoView({ block: 'nearest' });
}

function handle(ev) {
  if (ev.type === 'message_start') {
    meta('▶ MESSAGE START', `input_tokens: ${ev.message?.usage?.input_tokens ?? '-'}`);
  } else if (ev.type === 'content_block_start') {
    const b = getBlock(ev.index, ev.content_block.type);
    if (ev.content_block.type === 'tool_use')
      b.pre.textContent = 'name: ' + ev.content_block.name + '\ninput: ';
  } else if (ev.type === 'content_block_delta') {
    const b = blk[ev.index]; if (!b) return;
    const d = ev.delta;
    if (d.type === 'text_delta') b.pre.textContent += d.text;
    else if (d.type === 'thinking_delta') b.pre.textContent += d.thinking;
    else if (d.type === 'input_json_delta') b.pre.textContent += d.partial_json;
    b.pre.scrollIntoView({ block: 'nearest' });
  } else if (ev.type === 'message_delta') {
    meta('◼ MESSAGE DELTA', `stop_reason: ${ev.delta?.stop_reason ?? '-'} | output_tokens: ${ev.usage?.output_tokens ?? '-'}`);
  } else if (ev.type === 'message_stop') {
    meta('✅ DONE', '本轮流式完成');
  } else if (ev.type === 'tool_executing') {
    toolResult(ev.name, ev.input, ev.result);
  }
}
</script></body></html>

<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<title>SSE Demo — Claude 流式输出</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0d1117;color:#c9d1d9;padding:24px;max-width:900px;margin:0 auto}
h1{color:#58a6ff;font-size:1.3em;margin-bottom:6px}
.subtitle{color:#8b949e;font-size:.85em;margin-bottom:20px}
.row{display:flex;gap:10px;margin-bottom:16px}
input{flex:1;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px}
input:focus{outline:none;border-color:#58a6ff}
button{padding:10px 20px;background:#238636;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;white-space:nowrap}
button:hover{background:#2ea043}
button:disabled{background:#21262d;color:#8b949e;cursor:not-allowed}
#output{min-height:300px;border:1px solid #30363d;border-radius:6px;padding:16px;overflow-y:auto;max-height:600px}
.block{margin:8px 0;padding:10px 14px;border-radius:6px;border-left:4px solid}
.thinking{background:#1a1030;border-color:#8957e5}
.text{background:#0d2416;border-color:#2ea043}
.tool_use{background:#2a1a00;border-color:#d29922}
.meta{background:#161b22;border-color:#21262d;font-size:.82em}
.lbl{font-weight:bold;font-size:.75em;margin-bottom:5px;letter-spacing:.05em}
.thinking .lbl{color:#8957e5}
.text .lbl{color:#3fb950}
.tool_use .lbl{color:#d29922}
.meta .lbl{color:#58a6ff}
pre{white-space:pre-wrap;word-break:break-word;font-size:.88em;line-height:1.7;color:#e6edf3}
.meta pre{color:#8b949e}
.hint{color:#8b949e;font-size:.85em}
</style></head>
<body>
<h1>🌊 SSE 流式输出 Demo</h1>
<p class="subtitle">传输协议: <code>text/event-stream</code> &nbsp;|&nbsp; 客户端: <code>EventSource</code> &nbsp;|&nbsp; 方向: 服务端 → 客户端单向推送</p>
<div class="row">
  <input id="p" value="用中文解释量子纠缠是什么，并查询一下北京今天的天气" />
  <button id="btn" onclick="go()">▶ 开始流式</button>
</div>
<div id="output"><span class="hint">点击按钮开始，会看到 thinking / text / tool_use 三种数据块逐步出现…</span></div>

<script>
let es=null, blk={};

function go(){
  const p=document.getElementById('p').value.trim();
  if(!p) return;
  document.getElementById('output').innerHTML='';
  document.getElementById('btn').disabled=true;
  blk={};
  if(es) es.close();
  // EventSource 只支持 GET，参数通过 query string 传递
  es=new EventSource('/stream?prompt='+encodeURIComponent(p));
  es.onmessage=e=>handle(JSON.parse(e.data));
  es.onerror=()=>{ es.close(); document.getElementById('btn').disabled=false; };
}

function getBlock(idx, type){
  if(blk[idx]) return blk[idx];
  const wrap=document.createElement('div');
  wrap.className='block '+type;
  const lbl=document.createElement('div');
  lbl.className='lbl';
  lbl.textContent={'thinking':'🧠 THINKING BLOCK','text':'📝 TEXT BLOCK','tool_use':'🔧 TOOL USE BLOCK'}[type]||type;
  const pre=document.createElement('pre');
  wrap.appendChild(lbl); wrap.appendChild(pre);
  document.getElementById('output').appendChild(wrap);
  blk[idx]={pre, type};
  return blk[idx];
}

function meta(label,text){
  const d=document.createElement('div');
  d.className='block meta';
  d.innerHTML=`<div class="lbl">📊 ${label}</div><pre>${text}</pre>`;
  document.getElementById('output').appendChild(d);
  d.scrollIntoView({block:'nearest'});
}

function handle(ev){
  if(ev.type==='message_start'){
    const u=ev.message?.usage||{};
    meta('MESSAGE START',`input_tokens: ${u.input_tokens||'-'}`);
  } else if(ev.type==='content_block_start'){
    const cb=ev.content_block;
    const b=getBlock(ev.index, cb.type);
    if(cb.type==='tool_use') b.pre.textContent='name: '+cb.name+'\ninput: ';
  } else if(ev.type==='content_block_delta'){
    const b=blk[ev.index]; if(!b) return;
    const d=ev.delta;
    if(d.type==='text_delta') b.pre.textContent+=d.text;
    else if(d.type==='thinking_delta') b.pre.textContent+=d.thinking;
    else if(d.type==='input_json_delta') b.pre.textContent+=d.partial_json;
    b.pre.scrollIntoView({block:'nearest'});
  } else if(ev.type==='message_delta'){
    const d=ev.delta||{};
    meta('MESSAGE DELTA',`stop_reason: ${d.stop_reason||'-'}\noutput_tokens: ${ev.usage?.output_tokens||'-'}`);
  } else if(ev.type==='message_stop'){
    meta('DONE','✅ 流式输出完成');
    document.getElementById('btn').disabled=false;
    if(es) es.close();
  }
}
</script></body></html>
